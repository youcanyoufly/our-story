<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>我们的故事 🎬</title>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Serif+SC:wght@400;700&family=Playfair+Display:ital,wght@0,400;0,700;1,400&display=swap" rel="stylesheet">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }

        :root {
            --film-black: #0a0a0a;
            --film-dark: #141414;
            --film-warm: #e8d5b7;
            --film-gold: #c9a96e;
            --film-cream: #f5efe6;
            --paper: #f0e6d4;
            --paper-dark: #d4c4a8;
            --paper-edge: #c2a882;
        }

        body {
            font-family: 'Noto Serif SC', 'Georgia', serif;
            background: var(--film-black);
            color: var(--film-cream);
            overflow-x: hidden;
        }

        /* ===== 信封/信纸背景 ===== */
        .envelope-wrapper {
            position: relative;
            max-width: 900px;
            margin: 0 auto;
            padding: 0 20px;
        }

        /* 信封翻盖（顶部） */
        .envelope-flap {
            position: relative;
            width: 100%;
            height: 120px;
            overflow: hidden;
            z-index: 10;
        }
        .envelope-flap::before {
            content: '';
            position: absolute;
            top: 0; left: 0; right: 0;
            height: 0;
            border-left: 450px solid transparent;
            border-right: 450px solid transparent;
            border-top: 120px solid var(--paper-dark);
            filter: brightness(0.92);
        }
        .envelope-flap::after {
            content: '';
            position: absolute;
            top: 0; left: 0; right: 0;
            height: 0;
            border-left: 450px solid transparent;
            border-right: 450px solid transparent;
            border-top: 118px solid var(--paper);
        }

        /* 信封主体 */
        .envelope-body {
            position: relative;
            background: var(--paper);
            background-image:
                repeating-linear-gradient(
                    0deg,
                    transparent,
                    transparent 31px,
                    rgba(180,160,130,0.15) 31px,
                    rgba(180,160,130,0.15) 32px
                );
            background-position: 0 20px;
            box-shadow:
                0 2px 20px rgba(0,0,0,0.4),
                inset 0 0 80px rgba(180,160,130,0.1);
            padding: 40px 0 60px;
            color: #3a2f25;
        }

        /* 信纸边缘装饰线 */
        .envelope-body::before {
            content: '';
            position: absolute;
            top: 20px; bottom: 20px; left: 30px; right: 30px;
            border: 1px solid rgba(180,160,130,0.2);
            pointer-events: none;
        }

        /* 左侧红线（信纸经典样式） */
        .envelope-body::after {
            content: '';
            position: absolute;
            top: 0; bottom: 0; left: 70px;
            width: 1px;
            background: rgba(180,80,80,0.2);
        }

        /* 信封底部折痕 */
        .envelope-bottom {
            position: relative;
            width: 100%;
            height: 80px;
            overflow: hidden;
        }
        .envelope-bottom::before {
            content: '';
            position: absolute;
            bottom: 0; left: 0; right: 0;
            height: 0;
            border-left: 450px solid transparent;
            border-right: 450px solid transparent;
            border-bottom: 80px solid var(--paper-dark);
            filter: brightness(0.88);
        }

        /* 火漆印章 */
        .wax-seal {
            position: absolute;
            top: -30px;
            left: 50%;
            transform: translateX(-50%);
            width: 60px;
            height: 60px;
            z-index: 20;
        }
        .wax-seal .seal-circle {
            width: 100%;
            height: 100%;
            background: radial-gradient(circle at 35% 35%, #c44040, #8b1a1a 60%, #6b1010);
            border-radius: 50%;
            box-shadow:
                0 2px 8px rgba(0,0,0,0.4),
                inset 0 -2px 4px rgba(0,0,0,0.3),
                inset 0 2px 4px rgba(255,200,200,0.2);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1.6rem;
        }

        /* 信纸内的标题适配 */
        .envelope-body .opening {
            min-height: 80vh;
        }
        .envelope-body .opening h1 {
            color: #5a3e2b;
            text-shadow: none;
        }
        .envelope-body .opening .subtitle {
            color: #8b6914;
        }
        .envelope-body .opening .studio-name {
            color: #8b6914;
        }
        .envelope-body .opening .divider {
            background: #8b6914;
        }
        .envelope-body .opening .scroll-hint {
            color: rgba(139,105,20,0.4);
        }
        .envelope-body .scene-card h2 {
            color: #5a3e2b;
        }
        .envelope-body .scene-card .scene-num {
            color: #8b6914;
        }
        .envelope-body .scene-card .scene-date {
            color: rgba(139,105,20,0.6);
        }
        .envelope-body .scene-card::before,
        .envelope-body .scene-card::after {
            background: #8b6914;
        }
        .envelope-body .story-segment p {
            color: #3a2f25;
        }
        .envelope-body .typewriter .typed-text {
            color: #3a2f25;
        }
        .envelope-body .typewriter .author {
            color: #8b6914;
        }
        .envelope-body .typewriter {
            border-left-color: #8b6914;
        }
        .envelope-body .credit-item .role {
            color: #8b6914;
        }
        .envelope-body .credit-item .name {
            color: #5a3e2b;
        }
        .envelope-body .credits .the-end {
            color: #8b6914;
        }
        .envelope-body .credits .final-message {
            color: #5a3e2b;
        }

        /* 撕纸边缘效果 */
        .torn-edge {
            position: relative;
            width: 100%;
            height: 20px;
            overflow: hidden;
        }
        .torn-edge::before {
            content: '';
            position: absolute;
            bottom: 0; left: -10px; right: -10px;
            height: 20px;
            background: var(--paper);
            mask-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 1200 20' xmlns='http://www.w3.org/2000/svg'%3E%3Cpath d='M0,10 Q30,0 60,10 T120,10 T180,10 T240,10 T300,10 T360,10 T420,10 T480,10 T540,10 T600,10 T660,10 T720,10 T780,10 T840,10 T900,10 T960,10 T1020,10 T1080,10 T1140,10 T1200,10 L1200,20 L0,20 Z' fill='white'/%3E%3C/svg%3E");
            -webkit-mask-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 1200 20' xmlns='http://www.w3.org/2000/svg'%3E%3Cpath d='M0,10 Q30,0 60,10 T120,10 T180,10 T240,10 T300,10 T360,10 T420,10 T480,10 T540,10 T600,10 T660,10 T720,10 T780,10 T840,10 T900,10 T960,10 T1020,10 T1080,10 T1140,10 T1200,10 L1200,20 L0,20 Z' fill='white'/%3E%3C/svg%3E");
            mask-size: 100% 100%;
            -webkit-mask-size: 100% 100%;
        }

        /* 旧纸张纹理叠加 */
        .paper-texture {
            position: absolute;
            inset: 0;
            pointer-events: none;
            opacity: 0.03;
            background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 512 512' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='t'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.04' numOctaves='5' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23t)'/%3E%3C/svg%3E");
            mix-blend-mode: multiply;
        }

        /* 胶片条在信纸上适配 */
        .envelope-body .film-strip::before,
        .envelope-body .film-strip::after {
            background: #2a2018;
        }
        .envelope-body .film-frame img {
            filter: sepia(0.4) contrast(1.1) brightness(0.95);
        }
        .envelope-body .film-frame:hover img {
            filter: sepia(0) contrast(1.05) brightness(1);
        }

        /* 响应式信封 */
        @media (max-width: 940px) {
            .envelope-flap::before { border-left-width: 50vw; border-right-width: 50vw; }
            .envelope-flap::after { border-left-width: 50vw; border-right-width: 50vw; }
            .envelope-bottom::before { border-left-width: 50vw; border-right-width: 50vw; }
            .envelope-body::after { left: 30px; }
        }

        /* ===== 叠加层 ===== */
        .grain {
            position: fixed; inset: 0;
            pointer-events: none; z-index: 1000; opacity: 0.04;
            background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)'/%3E%3C/svg%3E");
            animation: grain 0.5s steps(6) infinite;
        }
        @keyframes grain {
            0%, 100% { transform: translate(0, 0); }
            10% { transform: translate(-2%, -3%); }
            30% { transform: translate(3%, 2%); }
            50% { transform: translate(-1%, 3%); }
            70% { transform: translate(2%, -2%); }
            90% { transform: translate(-3%, 1%); }
        }
        .vignette {
            position: fixed; inset: 0;
            pointer-events: none; z-index: 999;
            background: radial-gradient(ellipse at center, transparent 50%, rgba(0,0,0,0.7) 100%);
        }
        .scanlines {
            position: fixed; inset: 0;
            pointer-events: none; z-index: 998;
            background: repeating-linear-gradient(to bottom, transparent, transparent 2px, rgba(0,0,0,0.03) 2px, rgba(0,0,0,0.03) 4px);
        }

        /* ===== 倒计时 ===== */
        .countdown {
            position: fixed; inset: 0; background: var(--film-black);
            display: flex; align-items: center; justify-content: center;
            z-index: 2000; transition: opacity 0.8s;
        }
        .countdown.hide { opacity: 0; pointer-events: none; }
        .countdown-circle { width: 200px; height: 200px; position: relative; }
        .countdown-circle svg { width: 100%; height: 100%; transform: rotate(-90deg); }
        .countdown-circle .ring {
            fill: none; stroke: var(--film-gold); stroke-width: 3;
            stroke-dasharray: 565; stroke-dashoffset: 565;
            animation: countdown-ring 4s linear forwards;
        }
        .countdown-circle .number {
            position: absolute; inset: 0;
            display: flex; align-items: center; justify-content: center;
            font-size: 5rem; font-family: 'Playfair Display', serif; color: var(--film-gold);
        }
        .countdown-circle .scratch {
            position: absolute; inset: 0;
            border: 2px solid rgba(201,169,110,0.3); border-radius: 50%;
            animation: scratch-flicker 0.15s infinite;
        }
        @keyframes countdown-ring { to { stroke-dashoffset: 0; } }
        @keyframes scratch-flicker { 0%, 100% { opacity: 1; } 50% { opacity: 0.7; } }

        /* ===== 开场 ===== */
        .opening {
            min-height: 100vh;
            display: flex; flex-direction: column; align-items: center; justify-content: center;
            position: relative; opacity: 0;
            animation: fadeIn 2s ease 4.5s forwards;
        }
        .opening .studio-name {
            font-family: 'Playfair Display', serif;
            font-size: 0.9rem; letter-spacing: 12px; text-transform: uppercase;
            color: var(--film-gold); margin-bottom: 60px; opacity: 0;
            animation: typeIn 1.5s ease 5s forwards;
        }
        .opening h1 {
            font-size: 3.5rem; font-weight: 400; color: var(--film-warm);
            letter-spacing: 12px; text-shadow: 0 0 60px rgba(232,213,183,0.2);
            opacity: 0; animation: fadeIn 2s ease 6s forwards;
        }
        .opening .divider {
            width: 120px; height: 1px; background: var(--film-gold);
            margin: 30px 0; opacity: 0; animation: expandLine 1.5s ease 7s forwards;
        }
        .opening .subtitle {
            font-size: 1.1rem; color: var(--film-gold); letter-spacing: 6px;
            opacity: 0; animation: fadeIn 2s ease 7.5s forwards;
        }
        .opening .scroll-hint {
            position: absolute; bottom: 40px;
            font-size: 0.8rem; color: rgba(201,169,110,0.5); letter-spacing: 4px;
            opacity: 0; animation: fadeIn 2s ease 9s forwards, float 3s ease-in-out 9s infinite;
        }
        @keyframes fadeIn { to { opacity: 1; } }
        @keyframes typeIn { from { opacity: 0; letter-spacing: 20px; } to { opacity: 1; letter-spacing: 12px; } }
        @keyframes expandLine { from { opacity: 0; width: 0; } to { opacity: 1; width: 120px; } }
        @keyframes float { 0%, 100% { transform: translateY(0); } 50% { transform: translateY(-10px); } }

        /* ===== 场景标题卡 ===== */
        .scene-card {
            text-align: center; padding: 120px 20px; position: relative;
        }
        .scene-card .scene-num {
            font-family: 'Playfair Display', serif;
            font-size: 0.8rem; letter-spacing: 8px; color: var(--film-gold); margin-bottom: 20px;
        }
        .scene-card h2 {
            font-size: 2.5rem; font-weight: 400; color: var(--film-warm);
            letter-spacing: 8px; margin-bottom: 15px;
        }
        .scene-card .scene-date {
            font-size: 0.9rem; color: rgba(201,169,110,0.6); letter-spacing: 4px;
        }
        .scene-card::before, .scene-card::after {
            content: ''; position: absolute; left: 50%; transform: translateX(-50%);
            width: 40px; height: 1px; background: var(--film-gold); opacity: 0.4;
        }
        .scene-card::before { top: 60px; }
        .scene-card::after { bottom: 60px; }

        /* ===== 故事段落 ===== */
        .story-segment {
            max-width: 700px; margin: 0 auto; padding: 40px 30px;
            opacity: 0; transform: translateY(30px);
            transition: all 1.2s cubic-bezier(0.22, 1, 0.36, 1);
        }
        .story-segment.visible { opacity: 1; transform: translateY(0); }
        .story-segment p {
            font-size: 1.15rem; line-height: 2.2; color: var(--film-cream);
            text-indent: 2em; text-align: justify;
            white-space: pre-line;
        }

        /* ===== 胶片条 ===== */
        .film-strip { margin: 80px 0; overflow: hidden; position: relative; }
        .film-strip::before, .film-strip::after {
            content: ''; position: absolute; top: 0; bottom: 0;
            width: 35px; background: var(--film-dark); z-index: 2;
        }
        .film-strip::before { left: 0; }
        .film-strip::after { right: 0; }
        .film-strip .sprocket-holes {
            position: absolute; top: 0; bottom: 0; width: 25px; z-index: 3;
            display: flex; flex-direction: column; justify-content: space-around; padding: 15px 0;
        }
        .film-strip .sprocket-holes.left { left: 5px; }
        .film-strip .sprocket-holes.right { right: 5px; }
        .film-strip .sprocket-hole {
            width: 12px; height: 18px; background: var(--film-black);
            border-radius: 2px; border: 1px solid #333;
        }
        .film-track {
            display: flex; gap: 0;
            animation: film-scroll 30s linear infinite; width: max-content;
        }
        .film-track:hover { animation-play-state: paused; }
        @keyframes film-scroll { 0% { transform: translateX(0); } 100% { transform: translateX(-50%); } }
        .film-frame {
            flex-shrink: 0; width: 400px; height: 280px; padding: 20px 50px; position: relative;
        }
        .film-frame .frame-inner {
            width: 100%; height: 100%; overflow: hidden;
            border: 1px solid #333; position: relative;
        }
        .film-frame img {
            width: 100%; height: 100%; object-fit: cover;
            filter: sepia(0.6) contrast(1.1) brightness(0.9); transition: filter 1.5s ease;
        }
        .film-frame:hover img { filter: sepia(0) contrast(1.05) brightness(1); }
        .film-frame .frame-caption {
            position: absolute; bottom: 25px; left: 50px; right: 50px;
            text-align: center; font-size: 0.8rem; color: var(--film-gold);
            letter-spacing: 2px; opacity: 0; transition: opacity 0.5s;
            text-shadow: 0 1px 3px rgba(0,0,0,0.8);
        }
        .film-frame:hover .frame-caption { opacity: 1; }

        /* ===== 黑白→彩色照片 ===== */
        .photo-reveal {
            max-width: 600px; margin: 60px auto; position: relative;
            overflow: hidden; border-radius: 2px;
            opacity: 0; transform: translateY(30px); transition: all 1.2s ease;
        }
        .photo-reveal.visible { opacity: 1; transform: translateY(0); }
        .photo-reveal img {
            width: 100%; display: block;
            filter: grayscale(1) sepia(0.3) contrast(1.1); transition: filter 3s ease;
        }
        .photo-reveal.revealed img { filter: grayscale(0) sepia(0) contrast(1.05); }
        .photo-reveal .photo-overlay {
            position: absolute; inset: 0;
            border: 1px solid rgba(90,62,43,0.15); pointer-events: none;
        }
        .photo-reveal .photo-caption {
            position: absolute; bottom: 0; left: 0; right: 0;
            padding: 40px 20px 20px;
            background: linear-gradient(transparent, rgba(0,0,0,0.8));
            text-align: center; font-size: 0.9rem; color: var(--film-gold); letter-spacing: 3px;
        }

        /* ===== 打字机 ===== */
        .typewriter {
            max-width: 600px; margin: 80px auto; padding: 40px;
            border-left: 2px solid var(--film-gold);
            opacity: 0; transition: opacity 1s ease;
        }
        .typewriter.visible { opacity: 1; }
        .typewriter .typed-text {
            font-size: 1.2rem; line-height: 2; color: var(--film-cream); font-style: italic;
            white-space: pre-line;
        }
        .typewriter .typed-text .cursor {
            display: inline-block; width: 2px; height: 1.2em;
            background: var(--film-gold); margin-left: 2px;
            animation: blink 0.8s step-end infinite; vertical-align: text-bottom;
        }
        @keyframes blink { 50% { opacity: 0; } }
        .typewriter .author {
            margin-top: 20px; font-size: 0.9rem; color: var(--film-gold);
            text-align: right; letter-spacing: 2px;
        }

        /* ===== 片尾字幕 ===== */
        .credits { padding: 120px 20px 200px; text-align: center; position: relative; }
        .credits .the-end {
            font-family: 'Playfair Display', serif;
            font-size: 3rem; font-style: italic; color: var(--film-gold);
            margin-bottom: 80px; letter-spacing: 8px;
        }
        .credits-scroll { max-width: 500px; margin: 0 auto; }
        .credit-item {
            margin-bottom: 50px; opacity: 0; transform: translateY(20px);
            transition: all 1s ease;
        }
        .credit-item.visible { opacity: 1; transform: translateY(0); }
        .credit-item .role {
            font-size: 0.75rem; letter-spacing: 6px; text-transform: uppercase;
            color: var(--film-gold); margin-bottom: 8px;
        }
        .credit-item .name { font-size: 1.3rem; color: var(--film-warm); letter-spacing: 4px; }
        .credits .final-message {
            margin-top: 100px; font-size: 1.5rem; color: var(--film-warm);
            letter-spacing: 6px; opacity: 0; transition: opacity 2s ease;
        }
        .credits .final-message.visible { opacity: 1; }

        /* ===== 灯箱（双击放大） ===== */
        .lightbox {
            position: fixed; inset: 0; z-index: 5000;
            background: rgba(0,0,0,0.92);
            display: flex; align-items: center; justify-content: center;
            opacity: 0; visibility: hidden;
            transition: opacity 0.4s, visibility 0.4s;
            cursor: zoom-out;
        }
        .lightbox.active { opacity: 1; visibility: visible; }
        .lightbox img {
            max-width: 90vw; max-height: 85vh;
            object-fit: contain;
            border: 2px solid rgba(201,169,110,0.3);
            box-shadow: 0 0 60px rgba(0,0,0,0.6);
            transform: scale(0.8);
            transition: transform 0.4s cubic-bezier(0.22, 1, 0.36, 1), opacity 0.2s;
        }
        .lightbox.active img { transform: scale(1); }
        .lightbox .lb-caption {
            position: absolute; bottom: 40px; left: 0; right: 0;
            text-align: center;
            font-size: 1rem; color: var(--film-gold);
            letter-spacing: 3px;
            opacity: 0; transition: opacity 0.4s 0.2s;
        }
        .lightbox.active .lb-caption { opacity: 1; }
        .lightbox .lb-close {
            position: absolute; top: 30px; right: 30px;
            width: 40px; height: 40px;
            border: 1px solid rgba(201,169,110,0.4);
            border-radius: 50%;
            background: transparent;
            color: var(--film-gold);
            font-size: 1.2rem;
            cursor: pointer;
            display: flex; align-items: center; justify-content: center;
            transition: all 0.3s;
        }
        .lightbox .lb-close:hover {
            background: rgba(201,169,110,0.15);
            transform: scale(1.1);
        }
        .lightbox .lb-nav {
            position: absolute; top: 50%; transform: translateY(-50%);
            width: 50px; height: 50px;
            border: 1px solid rgba(201,169,110,0.3);
            border-radius: 50%;
            background: rgba(0,0,0,0.4);
            color: var(--film-gold);
            font-size: 1.3rem;
            cursor: pointer;
            display: flex; align-items: center; justify-content: center;
            transition: all 0.3s;
        }
        .lightbox .lb-nav:hover {
            background: rgba(201,169,110,0.15);
        }
        .lightbox .lb-prev { left: 30px; }
        .lightbox .lb-next { right: 30px; }

        /* ===== 音乐按钮 ===== */
        .music-control {
            position: fixed; bottom: 30px; right: 30px; z-index: 500;
            width: 50px; height: 50px; border-radius: 50%;
            background: rgba(20,20,20,0.8); border: 1px solid var(--film-gold);
            display: flex; align-items: center; justify-content: center;
            cursor: pointer; transition: all 0.3s; opacity: 0;
            animation: fadeIn 1s ease 5s forwards;
        }
        .music-control:hover { background: rgba(201,169,110,0.2); transform: scale(1.1); }
        .music-control .bar {
            width: 3px; margin: 0 2px; background: var(--film-gold);
            border-radius: 1px; transition: height 0.3s;
        }
        .music-control.playing .bar:nth-child(1) { height: 12px; animation: music-bar 0.5s ease infinite alternate; }
        .music-control.playing .bar:nth-child(2) { height: 20px; animation: music-bar 0.5s ease 0.1s infinite alternate; }
        .music-control.playing .bar:nth-child(3) { height: 15px; animation: music-bar 0.5s ease 0.2s infinite alternate; }
        .music-control.playing .bar:nth-child(4) { height: 10px; animation: music-bar 0.5s ease 0.3s infinite alternate; }
        .music-control:not(.playing) .bar { height: 8px; }
        @keyframes music-bar { to { height: 4px; } }

        /* ===== 闪白 ===== */
        .flash {
            position: fixed; inset: 0; background: white;
            z-index: 3000; opacity: 0; pointer-events: none;
        }
        .flash.active { animation: flash-anim 0.3s ease; }
        @keyframes flash-anim { 0% { opacity: 0.8; } 100% { opacity: 0; } }

        /* ===== 占位符 ===== */
        .img-placeholder {
            width: 100%; height: 100%;
            display: flex; align-items: center; justify-content: center;
            background: linear-gradient(135deg, #e8dcc8 0%, #d4c4a8 100%);
            color: rgba(90,62,43,0.3);
            font-size: 0.85rem; letter-spacing: 2px;
            border: 1px dashed rgba(90,62,43,0.15);
        }
        .film-frame .img-placeholder {
            background: linear-gradient(135deg, #1a1a1a 0%, #2a2a2a 100%);
            color: rgba(201,169,110,0.3);
            border-color: rgba(201,169,110,0.15);
        }

        /* ===== 响应式 ===== */
        @media (max-width: 700px) {
            .opening h1 { font-size: 2rem; letter-spacing: 6px; }
            .scene-card h2 { font-size: 1.8rem; }
            .film-frame { width: 300px; height: 200px; padding: 15px 35px; }
            .film-frame .frame-caption { left: 35px; right: 35px; }
            .story-segment p { font-size: 1rem; }
            .credits .the-end { font-size: 2rem; }
        }
    </style>
</head>
<body>

    <div class="grain"></div>
    <div class="vignette"></div>
    <div class="scanlines"></div>
    <div class="flash" id="flash"></div>

    <!-- 背景音乐：在目录下放 bgm.mp3 即可 -->
    <audio id="bgm" loop preload="auto">
        <source src="bgm.mp3" type="audio/mpeg">
    </audio>
    <div class="music-control" id="musicBtn" onclick="toggleMusic()">
        <div class="bar"></div><div class="bar"></div><div class="bar"></div><div class="bar"></div>
    </div>

    <!-- 倒计时 -->
    <div class="countdown" id="countdown">
        <div class="countdown-circle">
            <svg viewBox="0 0 200 200">
                <circle cx="100" cy="100" r="90" fill="none" stroke="#333" stroke-width="1"/>
                <circle class="ring" cx="100" cy="100" r="90"/>
                <line x1="100" y1="5" x2="100" y2="30" stroke="#c9a96e" stroke-width="0.5" opacity="0.5"/>
                <line x1="100" y1="170" x2="100" y2="195" stroke="#c9a96e" stroke-width="0.5" opacity="0.5"/>
                <line x1="5" y1="100" x2="30" y2="100" stroke="#c9a96e" stroke-width="0.5" opacity="0.5"/>
                <line x1="170" y1="100" x2="195" y2="100" stroke="#c9a96e" stroke-width="0.5" opacity="0.5"/>
            </svg>
            <div class="number" id="countNum">3</div>
            <div class="scratch"></div>
        </div>
    </div>

    <!-- 信封结构 -->
    <div class="envelope-wrapper">
        <div class="envelope-flap">
            <div class="wax-seal">
                <div class="seal-circle">❤️</div>
            </div>
        </div>
        <div class="envelope-body">
            <div class="paper-texture"></div>
            <!-- 所有内容由 JS 动态生成 -->
            <div id="app"></div>
        </div>
        <div class="envelope-bottom"></div>
    </div>

    <!-- 灯箱 -->
    <div class="lightbox" id="lightbox">
        <button class="lb-close" onclick="closeLightbox()">✕</button>
        <button class="lb-nav lb-prev" onclick="navLightbox(-1)">‹</button>
        <button class="lb-nav lb-next" onclick="navLightbox(1)">›</button>
        <img id="lbImg" src="" alt="">
        <div class="lb-caption" id="lbCaption"></div>
    </div>

    <script src="config.js"></script>
    <script>
    (function() {
        const C = CONFIG;

        // ===== 构建页面 =====
        function buildHTML() {
            let html = '';

            // 开场
            html += `
            <div class="opening">
                <div class="studio-name">A Love Story Production</div>
                <h1>我们的故事</h1>
                <div class="divider"></div>
                <div class="subtitle">${C.hisName} & ${C.herName}</div>
                <div class="scroll-hint">▼ 向下滚动 ▼</div>
            </div>`;

            // 第一幕
            html += buildAct('ACT I', C.act1, true);

            // 第二幕
            html += buildAct('ACT II', C.act2, false);

            // 第三幕
            html += buildAct('ACT III', C.act3, true);

            // 片尾
            html += buildCredits();

            document.getElementById('app').innerHTML = html;
        }

        function buildAct(actNum, act, hasFilmStrip) {
            let html = '';

            // 场景卡
            html += `
            <div class="scene-card" data-animate>
                <div class="scene-num">${actNum}</div>
                <h2>${act.title}</h2>
                <div class="scene-date">${act.date}</div>
            </div>`;

            // 故事
            html += `
            <div class="story-segment" data-animate>
                <p>${act.story}</p>
            </div>`;

            // 胶片条（第一幕和第三幕）
            if (hasFilmStrip && act.photos) {
                html += buildFilmStrip(act.photos);
            }

            // 第二幕额外内容
            if (act.photo) {
                html += `
                <div class="photo-reveal" data-animate data-reveal>
                    <img src="${act.photo.file}" alt=""
                         onerror="this.style.display='none';this.insertAdjacentHTML('afterend','<div class=\\'img-placeholder\\'>📷 ${act.photo.caption}</div>')">
                    <div class="photo-overlay"></div>
                    <div class="photo-caption">${act.photo.caption}</div>
                </div>`;
            }

            if (act.loveLetter) {
                html += `
                <div class="typewriter" data-animate data-type>
                    <div class="typed-text" data-text="${act.loveLetter.replace(/"/g, '&quot;')}"></div>
                    <div class="author">—— 写给你</div>
                </div>`;
            }

            // 第三幕额外故事
            if (act.endingStory) {
                html += `
                <div class="story-segment" data-animate>
                    <p>${act.endingStory}</p>
                </div>`;
            }

            return html;
        }

        function buildFilmStrip(photos) {
            const holes = Array(8).fill('<div class="sprocket-hole"></div>').join('');
            let frames = '';

            // 根据照片数量计算动画时长（每张约8秒）
            const duration = Math.max(photos.length * 8, 24);

            // 重复两份实现无缝滚动
            for (let i = 0; i < 2; i++) {
                photos.forEach((p, idx) => {
                    frames += `
                    <div class="film-frame" ondblclick="openLightbox(this)" data-file="${p.file}" data-caption="${p.caption}">
                        <div class="frame-inner">
                            <img src="${p.file}" alt=""
                                 onerror="this.style.display='none';this.insertAdjacentHTML('afterend','<div class=\\'img-placeholder\\'>📷 ${p.caption}</div>')">
                        </div>
                        <div class="frame-caption">${p.caption}</div>
                    </div>`;
                });
            }

            return `
            <div class="film-strip" data-animate>
                <div class="sprocket-holes left">${holes}</div>
                <div class="sprocket-holes right">${holes}</div>
                <div class="film-track" style="animation-duration:${duration}s">${frames}</div>
            </div>`;
        }

        function buildCredits() {
            const E = C.ending;
            let creditsHTML = '';
            E.credits.forEach(c => {
                creditsHTML += `
                <div class="credit-item" data-animate>
                    <div class="role">${c.role}</div>
                    <div class="name">${c.name}</div>
                </div>`;
            });

            return `
            <div class="credits">
                <div class="the-end" data-animate>Fin.</div>
                <div class="credits-scroll">${creditsHTML}</div>

                <!-- 最后一张照片 -->
                <div style="max-width:600px;margin:100px auto 0">
                    <div class="photo-reveal" data-animate data-reveal>
                        <img src="${E.photo.file}" alt=""
                             onerror="this.style.display='none';this.insertAdjacentHTML('afterend','<div class=\\'img-placeholder\\'>📷 ${E.photo.caption}</div>')">
                        <div class="photo-overlay"></div>
                        <div class="photo-caption">${E.photo.caption}</div>
                    </div>
                </div>

                <div class="final-message" data-animate>${E.finalMessage}</div>
            </div>`;
        }

        // ===== 初始化 =====
        buildHTML();

        // 倒计时
        const countdown = document.getElementById('countdown');
        const countNum = document.getElementById('countNum');
        let count = 3;
        const countInterval = setInterval(() => {
            count--;
            if (count > 0) {
                countNum.textContent = count;
                const flash = document.getElementById('flash');
                flash.classList.add('active');
                setTimeout(() => flash.classList.remove('active'), 300);
            } else {
                clearInterval(countInterval);
                setTimeout(() => {
                    countdown.classList.add('hide');
                    setTimeout(() => countdown.remove(), 1000);
                }, 500);
            }
        }, 1000);

        // 音乐
        const bgm = document.getElementById('bgm');
        const musicBtn = document.getElementById('musicBtn');
        let musicPlaying = false;

        window.toggleMusic = function() {
            if (musicPlaying) {
                bgm.pause();
                musicBtn.classList.remove('playing');
            } else {
                bgm.play();
                musicBtn.classList.add('playing');
            }
            musicPlaying = !musicPlaying;
        };

        document.addEventListener('click', function tryPlay() {
            if (!musicPlaying) {
                bgm.play().then(() => {
                    musicPlaying = true;
                    musicBtn.classList.add('playing');
                }).catch(() => {});
            }
        }, { once: true });

        // 滚动动画
        function setupObservers() {
            const animateElements = document.querySelectorAll('[data-animate]');
            const observer = new IntersectionObserver((entries) => {
                entries.forEach(entry => {
                    if (entry.isIntersecting) {
                        entry.target.classList.add('visible');
                        if (entry.target.hasAttribute('data-reveal')) {
                            setTimeout(() => entry.target.classList.add('revealed'), 500);
                        }
                        if (entry.target.hasAttribute('data-type')) {
                            startTypewriter(entry.target);
                        }
                    }
                });
            }, { threshold: 0.2 });
            animateElements.forEach(el => observer.observe(el));
        }

        function startTypewriter(container) {
            const textEl = container.querySelector('.typed-text');
            if (textEl.dataset.started) return;
            textEl.dataset.started = 'true';
            const text = textEl.dataset.text;
            textEl.innerHTML = '<span class="cursor"></span>';
            let i = 0;
            function type() {
                if (i < text.length) {
                    textEl.innerHTML = text.substring(0, i + 1) + '<span class="cursor"></span>';
                    i++;
                    setTimeout(type, 80 + Math.random() * 60);
                } else {
                    setTimeout(() => textEl.querySelector('.cursor')?.remove(), 2000);
                }
            }
            type();
        }

        // DOM 渲染完成后设置观察者
        setTimeout(setupObservers, 100);

        // ===== 灯箱 =====
        let currentGallery = [];
        let currentIndex = 0;

        window.openLightbox = function(el) {
            // 找到同一个胶片条里的所有帧（只取第一份，不取重复的）
            const strip = el.closest('.film-strip');
            const track = strip.querySelector('.film-track');
            const allFrames = track.querySelectorAll('.film-frame');
            const half = allFrames.length / 2;
            currentGallery = Array.from(allFrames).slice(0, half).map(f => ({
                file: f.dataset.file,
                caption: f.dataset.caption
            }));

            // 找到当前点击的是哪张
            const clickedFile = el.dataset.file;
            currentIndex = currentGallery.findIndex(g => g.file === clickedFile);
            if (currentIndex < 0) currentIndex = 0;

            showLightbox();
        };

        // 也支持 photo-reveal 双击放大
        document.addEventListener('dblclick', function(e) {
            const reveal = e.target.closest('.photo-reveal');
            if (reveal) {
                const img = reveal.querySelector('img');
                const caption = reveal.querySelector('.photo-caption');
                currentGallery = [{ file: img.src, caption: caption ? caption.textContent : '' }];
                currentIndex = 0;
                showLightbox();
            }
        });

        function showLightbox() {
            const lb = document.getElementById('lightbox');
            const item = currentGallery[currentIndex];
            document.getElementById('lbImg').src = item.file;
            document.getElementById('lbCaption').textContent = item.caption || '';

            // 多张时显示导航，单张隐藏
            const navs = lb.querySelectorAll('.lb-nav');
            navs.forEach(n => n.style.display = currentGallery.length > 1 ? 'flex' : 'none');

            lb.classList.add('active');
            document.body.style.overflow = 'hidden';
        }

        window.closeLightbox = function() {
            document.getElementById('lightbox').classList.remove('active');
            document.body.style.overflow = '';
        };

        window.navLightbox = function(dir) {
            currentIndex = (currentIndex + dir + currentGallery.length) % currentGallery.length;
            const item = currentGallery[currentIndex];
            const img = document.getElementById('lbImg');
            img.style.opacity = 0;
            setTimeout(() => {
                img.src = item.file;
                document.getElementById('lbCaption').textContent = item.caption || '';
                img.style.opacity = 1;
            }, 200);
        };

        // ESC 关闭灯箱
        document.addEventListener('keydown', function(e) {
            if (e.key === 'Escape') closeLightbox();
            if (e.key === 'ArrowLeft') navLightbox(-1);
            if (e.key === 'ArrowRight') navLightbox(1);
        });

        // 点击背景关闭灯箱
        document.getElementById('lightbox').addEventListener('click', function(e) {
            if (e.target === this) closeLightbox();
        });
    })();
    </script>
</body>
</html>
